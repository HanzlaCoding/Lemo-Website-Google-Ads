<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Booking Request Received - Luxury Limo Detroit</title>

    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://api.emailjs.com https://maps.googleapis.com https://maps.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com; img-src 'self' data: https: blob:; connect-src 'self' https://api.emailjs.com https://maps.googleapis.com https://maps.gstatic.com https://maps.google.com https://fonts.gstatic.com https://fonts.googleapis.com https://places.googleapis.com; worker-src 'self' blob:; frame-src https://www.google.com 'self'; object-src 'none';"
    />

    <style>
      :root {
        --primary-gold: #d4af37;
        --primary-gold-hover: #b5952f;
        --text-main: #ffffff;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body,
      html {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        background-color: #0a0a0a;
        color: var(--text-main);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        text-align: center;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }

      .success-container {
        background: rgba(15, 15, 15, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 3.5rem 2rem;
        border-radius: 16px;
        border: 1px solid rgba(212, 175, 55, 0.25);
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.45);
        max-width: 500px;
        width: 90%;
        animation: fadeIn 0.6s ease-out forwards;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 1.5rem;
        color: var(--primary-gold);
        filter: drop-shadow(0 4px 6px rgba(212, 175, 55, 0.2));
      }

      h1 {
        color: var(--primary-gold);
        font-size: 2.2rem;
        margin-bottom: 1rem;
        font-family: Georgia, serif;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      p {
        color: #d1d5db;
        margin-bottom: 2.5rem;
        line-height: 1.6;
        font-size: 1.05rem;
      }

      .cta-button {
        background: linear-gradient(
          135deg,
          var(--primary-gold) 0%,
          #f3cf55 100%
        );
        color: #1a1a1a;
        padding: 0.85rem 2.5rem;
        font-weight: 700;
        text-decoration: none;
        border-radius: 50px;
        display: inline-block;
        transition: all 0.3s ease;
        font-size: 1rem;
        box-shadow: 0 4px 6px -1px rgba(212, 175, 55, 0.3);
      }

      .cta-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(212, 175, 55, 0.4);
        filter: brightness(1.05);
      }
    </style>
  </head>

  <body>
    <div class="success-container">
      <svg
        class="icon"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"
        ></path>
      </svg>
      <h1>Booking Request Received</h1>
      <p>
        Thanks For Choosing Luxury Limo Detroit. We have received your booking
        and a member of our team will be in touch with you shortly.
      </p>
      <a href="./index.html" class="cta-button">Return to Home</a>
    </div>
  </body>
</html>
